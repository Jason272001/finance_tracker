<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KeeperBMA - Sign In</title>
  <link rel="icon" type="image/png" href="../../assets/keeperbma-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=28" />
</head>
<body>
  <main class="page">
    <header class="landing-nav">
      <div class="brand-row">
        <img class="brand-logo small" src="../../assets/keeperbma-icon.png" alt="KeeperBMA" />
        <h1>KeeperBMA</h1>
      </div>
      <div class="landing-links">
        <label for="authLangSelect">Language</label>
        <select id="authLangSelect" class="lang-select">
          <option value="en">English</option>
          <option value="my">Myanmar</option>
          <option value="ar">Arabic</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
        </select>
        <a href="./index.html">Home</a>
      </div>
    </header>

    <section class="auth-shell">
      <div class="tabs">
        <button id="tabSignin" class="tab active">Sign In</button>
        <button id="tabSignup" class="tab">Sign Up</button>
        <button id="tabRecover" class="tab">Recover</button>
      </div>

      <section class="card auth-card">
        <label for="authName" id="labelName">Username</label>
        <input id="authName" placeholder="Username" />
        <div id="signupFields" class="hidden">
          <label for="authEmail">Email</label>
          <input id="authEmail" type="email" placeholder="name@example.com" />
          <label>Phone</label>
          <div class="row phone-row">
            <select id="authCountryCode">
              <option value="+1">+1 (US)</option>
              <option value="+95">+95 (MM)</option>
              <option value="+81">+81 (JP)</option>
              <option value="+86">+86 (CN)</option>
              <option value="+44">+44 (UK)</option>
              <option value="+61">+61 (AU)</option>
              <option value="+65">+65 (SG)</option>
              <option value="+91">+91 (IN)</option>
            </select>
            <input id="authPhoneLocal" placeholder="Phone number" />
          </div>
          <label for="authCoupon">Coupon Code (Optional)</label>
          <input id="authCoupon" placeholder="Enter coupon code" />
        </div>
        <div id="recoverFields" class="hidden">
          <label for="recoverEmail">Email</label>
          <input id="recoverEmail" type="email" placeholder="name@example.com" />
          <button id="btnSendCode" class="secondary full">Send Recovery Code</button>
          <label for="recoverCode">Recovery Code</label>
          <input id="recoverCode" placeholder="6-digit code from email" />
        </div>
        <label for="authPass" id="labelPassword">Password</label>
        <input id="authPass" type="password" placeholder="Password" />
        <div id="confirmWrap" class="hidden">
          <label for="authPassConfirm" id="labelConfirmPassword">Confirm Password</label>
          <input id="authPassConfirm" type="password" placeholder="Confirm Password" />
        </div>
        <button id="btnForgot" class="secondary full">Forgot Password?</button>
        <button id="authSubmit" class="primary full">Sign In</button>
        <p id="authStatus" class="muted"></p>
      </section>
    </section>
  </main>

  <script src="./auth.js?v=7"></script>
</body>
</html>
