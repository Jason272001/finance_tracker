<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KeeperBMA Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&family=Noto+Sans+Myanmar:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=8" />
</head>
<body>
  <main class="page">
    <div class="lang-bar">
      <label id="langLabel" for="langSelect">Language</label>
      <select id="langSelect">
        <option value="en">English</option>
        <option value="es">Espanol</option>
        <option value="fr">Francais</option>
        <option value="my">Myanmar</option>
        <option value="ar">Arabic</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
      </select>
    </div>

    <section id="authScreen" class="auth-shell">
      <div class="brand-row">
        <img class="brand-logo" src="../../assets/keeperbma-icon.png" alt="KeeperBMA" />
        <h1>KeeperBMA</h1>
      </div>
      <p id="welcomeTitle" class="welcome">Welcome</p>

      <div class="tabs">
        <button id="tabLogin" class="tab active">Login</button>
        <button id="tabRegister" class="tab">Register</button>
      </div>

      <section class="card auth-card">
        <label id="labelName" for="loginName">Name</label>
        <input id="loginName" placeholder="Name" />

        <label id="labelPassword" for="loginPass">Password</label>
        <input id="loginPass" type="password" placeholder="Password" />

        <button id="authAction" class="primary full">Login</button>
        <p id="authStatus" class="muted"></p>
      </section>
    </section>

    <section id="appScreen" class="app-shell hidden">
      <header class="top">
        <h1>KeeperBMA</h1>
        <div>
          <span id="userBadge" class="badge"></span>
          <button id="btnLogout" class="secondary">Logout</button>
        </div>
      </header>

      <section class="card app-status">
        <p id="health" class="muted"></p>
      </section>

      <div class="grid">
        <section class="card">
          <h2 id="accountsTitle">Accounts</h2>
          <div class="row">
            <input id="accName" placeholder="Account Name" />
            <select id="accType">
              <option>checking</option>
              <option>credit_card</option>
              <option>saving</option>
              <option>cash</option>
              <option>asset</option>
            </select>
            <input id="accGroup" placeholder="Group" value="bank" />
            <input id="accBal" type="number" step="0.01" placeholder="Balance" value="0" />
          </div>
          <button id="btnAddAccount">Add Account</button>
          <ul id="accounts"></ul>
        </section>

        <section class="card">
          <h2 id="categoriesTitle">Categories</h2>
          <div class="row">
            <input id="catName" placeholder="Category Name" />
            <button id="btnAddCategory">Add Category</button>
          </div>
          <ul id="categories"></ul>
        </section>

        <section class="card span-2">
          <h2 id="transactionsTitle">Transactions</h2>
          <div class="row">
            <select id="txType">
              <option>income</option>
              <option>expense</option>
            </select>
            <input id="txAmount" type="number" step="0.01" placeholder="Amount" />
            <select id="txAccount"></select>
            <input id="txCategory" placeholder="Category" />
            <input id="txNote" placeholder="Note" />
          </div>
          <button id="btnAddTx">Add Transaction</button>
          <table>
            <thead>
              <tr>
                <th id="thId">ID</th>
                <th id="thDate">Date</th>
                <th id="thType">Type</th>
                <th id="thAmount">Amount</th>
                <th id="thAccount">Account</th>
                <th id="thCategory">Category</th>
                <th id="thNote">Note</th>
              </tr>
            </thead>
            <tbody id="txRows"></tbody>
          </table>
        </section>
      </div>
    </section>
  </main>

  <script src="./web.js?v=8"></script>
</body>
</html>
