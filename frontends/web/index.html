<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KeeperBMA Web</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="top">
    <h1>KeeperBMA</h1>
    <p>Web client powered by Render API</p>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Config</h2>
      <label>API Base URL</label>
      <input id="apiBase" value="https://keeperbma-backend.onrender.com" />
      <button id="saveApi">Save</button>
      <p id="health" class="muted"></p>
    </section>

    <section class="card">
      <h2>Auth</h2>
      <div class="row">
        <input id="loginName" placeholder="Name" />
        <input id="loginPass" type="password" placeholder="Password" />
      </div>
      <div class="row">
        <button id="btnLogin">Login</button>
        <button id="btnRegister" class="secondary">Register</button>
      </div>
      <p id="authStatus" class="muted"></p>
    </section>

    <section class="card">
      <h2>Accounts</h2>
      <div class="row">
        <input id="accName" placeholder="Account Name" />
        <select id="accType">
          <option>checking</option>
          <option>credit_card</option>
          <option>saving</option>
          <option>cash</option>
          <option>asset</option>
        </select>
        <input id="accGroup" placeholder="Group" value="bank" />
        <input id="accBal" type="number" step="0.01" placeholder="Balance" value="0" />
      </div>
      <button id="btnAddAccount">Add Account</button>
      <ul id="accounts"></ul>
    </section>

    <section class="card">
      <h2>Categories</h2>
      <div class="row">
        <input id="catName" placeholder="Category Name" />
        <button id="btnAddCategory">Add Category</button>
      </div>
      <ul id="categories"></ul>
    </section>

    <section class="card span-2">
      <h2>Transactions</h2>
      <div class="row">
        <select id="txType">
          <option>income</option>
          <option>expense</option>
        </select>
        <input id="txAmount" type="number" step="0.01" placeholder="Amount" />
        <select id="txAccount"></select>
        <input id="txCategory" placeholder="Category" />
        <input id="txNote" placeholder="Note" />
      </div>
      <button id="btnAddTx">Add Transaction</button>
      <table>
        <thead>
          <tr><th>ID</th><th>Date</th><th>Type</th><th>Amount</th><th>Account</th><th>Category</th><th>Note</th></tr>
        </thead>
        <tbody id="txRows"></tbody>
      </table>
    </section>
  </main>

  <script src="./web.js"></script>
</body>
</html>
