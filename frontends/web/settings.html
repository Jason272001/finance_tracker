<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KeeperBMA Settings</title>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; block-all-mixed-content" />
  <link rel="icon" type="image/png" href="../../assets/keeperbma-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script>
    if (
      window.location.protocol === "http:" &&
      !["localhost", "127.0.0.1"].includes(window.location.hostname)
    ) {
      window.location.replace(`https://${window.location.host}${window.location.pathname}${window.location.search}${window.location.hash}`);
    }
    document.documentElement.dataset.theme = localStorage.getItem("keeperbma_theme") || "light";
  </script>
  <link rel="stylesheet" href="./styles.css?v=39" />
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <main class="page">
    <section class="app-shell">
      <header class="top">
        <div class="top-left">
          <img id="topLogo" class="top-logo" src="../../assets/keeperbma-icon.png" alt="KeeperBMA logo" />
          <h1>KeeperBMA</h1>
        </div>
        <div class="top-right">
          <div class="theme-switch compact">
            <span id="settingsThemeLabel">Theme</span>
            <button id="settingsThemeToggle" type="button" class="theme-toggle" aria-pressed="false">
              <span class="theme-toggle-thumb" aria-hidden="true"></span>
            </button>
          </div>
          <label id="langLabelApp" for="appLangSelect">Language</label>
          <select id="appLangSelect" class="lang-select">
            <option value="en">English</option>
            <option value="my">Myanmar</option>
            <option value="ar">Arabic</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
          <span id="userBadge" class="badge"></span>
          <button id="btnBackDashboard" class="accent">Dashboard</button>
          <button id="btnLogout" class="danger">Logout</button>
        </div>
      </header>

      <section class="card">
        <h2 id="profileTitle">Profile & Settings</h2>
        <div class="row">
          <div class="profile-avatar-box">
            <img id="profileAvatarPreview" class="profile-avatar" src="../../assets/keeperbma-icon.png" alt="Profile" />
            <input id="profileImageInput" type="file" accept="image/*" />
            <button id="btnRemoveProfileImage" class="danger">Remove Photo</button>
          </div>
          <div style="flex: 1 1 460px;">
            <label id="profileUsernameLabel" for="profileUsername">Username</label>
            <input id="profileUsername" placeholder="Username" />
            <label id="profileEmailLabel" for="profileEmail">Email</label>
            <input id="profileEmail" type="email" placeholder="name@example.com" />
            <label id="profilePhoneLabel" for="profilePhone">Phone</label>
            <input id="profilePhone" placeholder="+1 5551234567" />
            <label for="profileEmailNotifications">
              <input id="profileEmailNotifications" type="checkbox" />
              <span id="emailNotifLabel">Email Notifications Enabled</span>
            </label>
            <div class="row">
              <button id="btnSaveProfile">Save Profile</button>
            </div>
            <p id="profileStatus" class="muted"></p>
          </div>
        </div>
        <div class="row">
          <div style="flex: 1 1 300px;">
            <label id="currentPasswordLabel" for="currentPassword">Current Password</label>
            <input id="currentPassword" type="password" placeholder="Current password" />
          </div>
          <div style="flex: 1 1 300px;">
            <label id="newPasswordLabel" for="newPassword">New Password</label>
            <input id="newPassword" type="password" placeholder="New password (10+ letters+numbers)" />
          </div>
          <div style="flex: 1 1 300px;">
            <label id="confirmNewPasswordLabel" for="confirmNewPassword">Confirm New Password</label>
            <input id="confirmNewPassword" type="password" placeholder="Confirm new password" />
          </div>
        </div>
        <div class="row">
          <button id="btnChangePassword" class="secondary">Update Password</button>
        </div>
        <p id="passwordStatus" class="muted"></p>
      </section>

      <section class="card">
        <h2 id="subscriptionTitle">Subscription</h2>
        <div class="row plan-meta">
          <div><strong id="currentPlanLabel">Current Plan</strong><div id="planCodeValue">Basic</div></div>
          <div><strong id="planStatusLabel">Status</strong><div id="planStatusValue">active</div></div>
          <div><strong id="trialEndsLabel">Trial Ends</strong><div id="trialEndsValue">-</div></div>
          <div><strong id="trialDaysLabel">Trial Days Left</strong><div id="trialDaysValue">0</div></div>
        </div>
        <div class="row">
          <label id="changePlanLabel" for="planBtnBasic">Change Plan</label>
        </div>
        <div class="row">
          <div>
            <label id="billingCycleLabel" for="billingCycleSelect">Billing Cycle</label>
            <select id="billingCycleSelect">
              <option id="billingCycleMonthlyOption" value="monthly">Monthly</option>
              <option id="billingCycleAnnualOption" value="annual">Annual</option>
            </select>
            <p id="billingSavingsHint" class="muted"></p>
          </div>
        </div>
        <div class="row">
          <button id="planBtnBasic" class="plan-btn" data-plan="basic">Basic</button>
          <button id="planBtnRegular" class="plan-btn" data-plan="regular">Regular</button>
          <button id="planBtnBusiness" class="plan-btn" data-plan="business">Business</button>
          <button id="planBtnPremium" class="plan-btn" data-plan="premium_plus">Premium Plus</button>
        </div>
        <div class="row">
          <button id="btnOpenBillingPortal" class="secondary">Manage Billing</button>
          <button id="btnCancelSubscription" class="danger">Cancel Subscription</button>
        </div>
        <p id="planStatusMsg" class="muted"></p>
      </section>

      <section id="embeddedCheckoutCard" class="card hidden">
        <div class="row">
          <h2 id="embeddedCheckoutTitle">Secure Payment</h2>
        </div>
        <div id="embeddedCheckoutContainer"></div>
        <div class="row">
          <button id="btnCloseEmbeddedCheckout" class="secondary">Close Payment</button>
        </div>
      </section>
    </section>
  </main>
  <script src="./settings.js?v=9"></script>
</body>
</html>
